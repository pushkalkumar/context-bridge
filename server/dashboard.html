<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Context Bridge</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--border:#21262d;
  --text:#c9d1d9;--muted:#8b949e;--bright:#e6edf3;
  --blue:#58a6ff;--green:#3fb950;--yellow:#d29922;
  --red:#f85149;--purple:#bc8cff;--orange:#f0883e;
}
body{font-family:'Menlo','Monaco','Consolas',monospace;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;font-size:13px}
a{color:var(--blue);text-decoration:none}

header{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;flex-shrink:0}
header h1{font-size:12px;color:var(--blue);letter-spacing:2px;font-weight:700}
#hdr-status{font-size:11px;color:var(--muted)}
#hdr-planner{font-size:11px;padding:2px 8px;border-radius:10px;border:1px solid var(--border)}
#hdr-stats{font-size:11px;color:var(--muted);margin-left:auto}

.layout{display:flex;flex:1;overflow:hidden}

.sidebar{width:260px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-hdr{padding:10px 14px 6px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border)}
.project-list{overflow-y:auto;flex:1}
.project-item{padding:9px 14px;cursor:pointer;border-left:2px solid transparent;transition:background .1s}
.project-item:hover{background:var(--surface)}
.project-item.active{background:var(--surface);border-left-color:var(--blue)}
.proj-name{color:var(--bright);font-size:12px;display:flex;align-items:center;gap:6px}
.proj-meta{color:var(--muted);font-size:11px;margin-top:3px;display:flex;gap:6px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
.dot-green{background:var(--green)}.dot-yellow{background:var(--yellow)}.dot-gray{background:#484f58}
.stag-badge{font-size:9px;padding:1px 5px;border-radius:3px;background:#5a1e02;color:var(--yellow)}
.src-badge{font-size:9px;padding:1px 5px;border-radius:3px;border:1px solid var(--border);color:var(--muted)}
.src-anthropic{border-color:#7c3aed;color:#a78bfa}
.src-ollama{border-color:#065f46;color:#34d399}

.content{flex:1;overflow-y:auto;padding:20px 24px}
.empty{text-align:center;color:var(--muted);margin-top:100px;line-height:2}

.section-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.section-hdr h2{font-size:13px;color:var(--muted);font-weight:400}
.section-hdr-right{display:flex;gap:8px;align-items:center}
.section-hdr span{font-size:11px;color:var(--muted)}
.btn{font-size:11px;padding:3px 10px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-family:inherit}
.btn:hover{border-color:var(--blue);color:var(--blue)}

.card{border:1px solid var(--border);border-radius:6px;margin-bottom:14px;overflow:hidden}
.card.stagnant{border-color:#5a3e00}
.card-hdr{padding:9px 14px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px}
.card-task{color:var(--bright);font-size:12px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-meta{display:flex;gap:6px;align-items:center;flex-shrink:0}
.card-ts{color:var(--muted);font-size:10px}
.card-body{padding:12px 14px;display:grid;gap:8px}
.field{display:grid;gap:3px}
.field-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.field-val{font-size:12px;color:var(--text);line-height:1.5}
.files{display:flex;flex-wrap:wrap;gap:4px}
.file-tag{font-size:10px;padding:2px 6px;background:#0d2044;color:var(--blue);border-radius:3px;border:1px solid #1f3a6e}
.blockers{color:var(--red);font-size:12px}

.planner{margin-top:4px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:4px;display:grid;gap:6px}
.planner-hdr{display:flex;align-items:center;gap:6px}
.planner-lbl{font-size:10px;color:var(--blue);text-transform:uppercase;letter-spacing:1px}
.p-instruction{color:var(--green);font-size:12px;line-height:1.5}
.p-priority{color:var(--yellow);font-size:11px}
.p-plan{color:var(--muted);font-size:11px;line-height:1.4;white-space:pre-wrap}

.stag-warn{padding:10px 14px;background:#1a0e00;border:1px solid #5a3e00;border-radius:6px;margin-bottom:14px;font-size:12px;color:var(--yellow)}

.loading{color:var(--muted);font-size:12px;padding:20px 0}
.err{color:var(--red);font-size:12px;padding:20px 0}

::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
</style>
</head>
<body>
<header>
  <h1>CONTEXT BRIDGE</h1>
  <span id="hdr-status">connecting...</span>
  <span id="hdr-planner"></span>
  <span id="hdr-stats"></span>
</header>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-hdr">Projects</div>
    <div class="project-list" id="project-list">
      <div class="loading" style="padding:14px">Loading...</div>
    </div>
  </div>
  <div class="content" id="content">
    <div class="empty">
      Select a project.<br>
      No projects yet? Start Claude Code and it will checkpoint automatically.
    </div>
  </div>
</div>

<script>
'use strict';
let activeId = null;

function timeAgo(ts) {
  const s = (Date.now() - new Date(ts).getTime()) / 1000;
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

function dotClass(ts) {
  const s = (Date.now() - new Date(ts).getTime()) / 1000;
  return s < 3600 ? 'dot-green' : s < 86400 ? 'dot-yellow' : 'dot-gray';
}

function srcBadge(source) {
  if (!source) return '';
  const cls = source === 'anthropic' ? 'src-anthropic' : source === 'ollama' ? 'src-ollama' : '';
  return `<span class="src-badge ${cls}">${source}</span>`;
}

function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

async function loadStats() {
  try {
    const r = await fetch('/stats');
    const s = await r.json();
    document.getElementById('hdr-stats').textContent =
      `${s.total_checkpoints} checkpoints · ${s.stagnation_events} stagnation${s.stagnation_events !== 1 ? 's' : ''}`;
  } catch {}
}

async function loadProjects() {
  let projects;
  try {
    const r = await fetch('/projects');
    projects = await r.json();
  } catch {
    document.getElementById('hdr-status').textContent = 'backend unreachable';
    return;
  }

  document.getElementById('hdr-status').textContent =
    projects.length + ' project' + (projects.length !== 1 ? 's' : '');

  const el = document.getElementById('project-list');
  if (!projects.length) {
    el.innerHTML = '<div style="padding:14px;color:var(--muted);font-size:12px">No projects yet.</div>';
    return;
  }

  el.innerHTML = projects.map(p => {
    const stagBadge = p.stagnation_count >= 3
      ? `<span class="stag-badge">stagnant</span>` : '';
    return `
      <div class="project-item${activeId === p.project_id ? ' active' : ''}"
           id="proj-${esc(p.project_id)}"
           onclick="loadHistory('${esc(p.project_id)}')">
        <div class="proj-name">
          <span class="dot ${dotClass(p.last_active)}"></span>
          ${esc(p.project_id)}
          ${stagBadge}
        </div>
        <div class="proj-meta">
          ${p.checkpoint_count} checkpoints
          <span>·</span>
          ${timeAgo(p.last_active)}
        </div>
      </div>`;
  }).join('');

  if (!activeId && projects.length) loadHistory(projects[0].project_id);
}

async function loadHistory(projectId) {
  document.getElementById('proj-' + activeId)?.classList.remove('active');
  activeId = projectId;
  document.getElementById('proj-' + projectId)?.classList.add('active');

  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Loading...</div>';

  let checkpoints;
  try {
    const r = await fetch('/history/' + encodeURIComponent(projectId));
    if (!r.ok) {
      const err = await r.json();
      content.innerHTML = `<div class="err">${esc(err.message || 'Failed to load.')}</div>`;
      return;
    }
    checkpoints = await r.json();
  } catch (e) {
    content.innerHTML = `<div class="err">Failed to load: ${esc(e.message)}</div>`;
    return;
  }

  if (!checkpoints.length) {
    content.innerHTML = '<div class="empty">No checkpoints for this project.</div>';
    return;
  }

  // Use server-side stagnation_count from the latest checkpoint
  const latest = checkpoints[0];
  const stagnant = (latest.stagnation_count || 0) >= 3;
  const goal = latest.user_goal;

  content.innerHTML = `
    <div class="section-hdr">
      <h2>${esc(projectId)}</h2>
      <div class="section-hdr-right">
        <span>${esc(goal)}</span>
        <button class="btn" onclick="exportProject('${esc(projectId)}')">export</button>
        <button class="btn" style="color:var(--red)" onclick="deleteProject('${esc(projectId)}')">delete</button>
      </div>
    </div>
    ${stagnant ? `
    <div class="stag-warn">
      Stagnation: <strong>${esc(latest.current_task)}</strong> has appeared
      ${latest.stagnation_count} times in a row. Break it into a smaller subtask.
    </div>` : ''}
    ${checkpoints.map(renderCard).join('')}
  `;
}

function renderCard(cp) {
  const files = (cp.current_state?.files_modified || []).slice(0, 8);
  const blockers = cp.blockers || [];
  const planner = cp._planner_output;
  const ts = new Date(cp.timestamp);
  const stagnant = (cp.stagnation_count || 0) >= 3;

  return `
    <div class="card${stagnant ? ' stagnant' : ''}">
      <div class="card-hdr">
        <div class="card-task" title="${esc(cp.current_task)}">${esc(cp.current_task)}</div>
        <div class="card-meta">
          ${stagnant ? '<span class="stag-badge">stagnant</span>' : ''}
          <span class="card-ts">${ts.toLocaleString()}</span>
        </div>
      </div>
      <div class="card-body">
        <div class="field">
          <div class="field-lbl">Progress</div>
          <div class="field-val">${esc(cp.progress_summary)}</div>
        </div>
        ${files.length ? `
        <div class="field">
          <div class="field-lbl">Files</div>
          <div class="files">${files.map(f => `<span class="file-tag">${esc(f)}</span>`).join('')}</div>
        </div>` : ''}
        ${blockers.length ? `
        <div class="field">
          <div class="field-lbl">Blockers</div>
          <div class="blockers">${blockers.map(esc).join('<br>')}</div>
        </div>` : ''}
        ${planner ? `
        <div class="planner">
          <div class="planner-hdr">
            <div class="planner-lbl">Planner</div>
            ${srcBadge(planner.source)}
          </div>
          <div class="p-instruction">${esc(planner.next_instruction)}</div>
          ${planner.priority_focus ? `<div class="p-priority">${esc(planner.priority_focus)}</div>` : ''}
          ${planner.revised_plan ? `<div class="p-plan">${esc(planner.revised_plan)}</div>` : ''}
        </div>` : ''}
      </div>
    </div>`;
}

async function exportProject(projectId) {
  window.open('/projects/' + encodeURIComponent(projectId) + '/export', '_blank');
}

async function deleteProject(projectId) {
  if (!confirm(`Delete all checkpoints for "${projectId}"?`)) return;
  try {
    const r = await fetch('/projects/' + encodeURIComponent(projectId), { method: 'DELETE' });
    if (r.ok) {
      activeId = null;
      document.getElementById('content').innerHTML =
        '<div class="empty">Project deleted.</div>';
      loadProjects();
    }
  } catch (e) {
    alert('Delete failed: ' + e.message);
  }
}

async function checkPlanner() {
  try {
    const r = await fetch('/health');
    if (r.ok) {
      const d = await r.json();
      const el = document.getElementById('hdr-planner');
      el.textContent = 'backend ok';
      el.style.color = 'var(--green)';
    }
  } catch {}
}

loadProjects();
loadStats();
checkPlanner();
setInterval(() => { loadProjects(); loadStats(); }, 15000);
</script>
</body>
</html>
